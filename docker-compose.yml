version: "3.9"

services:
  # ─── Databases ────────────────────────────────────────────────
  user-db:
    image: postgres:15-alpine
    container_name: user-db
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: userpass
    volumes:
      - user_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d userdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  product-db:
    image: postgres:15-alpine
    container_name: product-db
    environment:
      POSTGRES_DB: productdb
      POSTGRES_USER: product
      POSTGRES_PASSWORD: productpass
    volumes:
      - product_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U product -d productdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  order-db:
    image: postgres:15-alpine
    container_name: order-db
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: orderuser
      POSTGRES_PASSWORD: orderpass
    volumes:
      - order_db_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderuser -d orderdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Microservices ────────────────────────────────────────────
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    environment:
      DATABASE_URL: postgresql+asyncpg://user:userpass@user-db:5432/userdb
      SERVICE_NAME: user-service
      PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - microservices-net
    restart: unless-stopped

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: product-service
    environment:
      DATABASE_URL: postgresql+asyncpg://product:productpass@product-db:5432/productdb
      SERVICE_NAME: product-service
      PORT: "8001"
    ports:
      - "8001:8001"
    depends_on:
      product-db:
        condition: service_healthy
    networks:
      - microservices-net
    restart: unless-stopped

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    environment:
      DATABASE_URL: postgresql+asyncpg://orderuser:orderpass@order-db:5432/orderdb
      SERVICE_NAME: order-service
      PORT: "8002"
      USER_SERVICE_URL: http://user-service:8000
      PRODUCT_SERVICE_URL: http://product-service:8001
    ports:
      - "8002:8002"
    depends_on:
      order-db:
        condition: service_healthy
      user-service:
        condition: service_started
      product-service:
        condition: service_started
    networks:
      - microservices-net
    restart: unless-stopped

  # ─── Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    environment:
      NEXT_PUBLIC_USER_API: http://localhost:8000
      NEXT_PUBLIC_PRODUCT_API: http://localhost:8001
      NEXT_PUBLIC_ORDER_API: http://localhost:8002
    ports:
      - "3000:3000"
    depends_on:
      - user-service
      - product-service
      - order-service
    networks:
      - microservices-net
    restart: unless-stopped

volumes:
  user_db_data:
  product_db_data:
  order_db_data:

networks:
  microservices-net:
    driver: bridge
